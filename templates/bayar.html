<!DOCTYPE html>
<html>

<head>
    <title>Pembayaran Piutang</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3>Pembayaran Piutang</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>No Nota</label>
                    <input type="text"
                           class="form-control"
                           value="{{ data.no_nota }}"
                           readonly>
                </div>

                <div class="mb-3">
                    <label>Nama</label>
                    <input type="text"
                           class="form-control"
                           value="{{ data.nama }}"
                           readonly>
                </div>

                <div class="mb-3">
                    <label>Nominal Piutang</label>
                    <input type="text"
                           class="form-control"
                           value="Rp {{ '{:,.0f}'.format(data.nominal) }}"
                           readonly>
                </div>

                <div class="mb-3">
                    <label>Tanggal Bayar</label>
                    <input type="date"
                           name="tanggal_bayar"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Nominal Bayar</label>
                    <input type="number"
                           name="nominal_bayar"
                           value="{{ data.nominal }}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Metode Bayar</label>

                    <select name="metode_bayar"
                            class="form-select">

                        <option>Tunai</option>
                        <option>Transfer BCA</option>
                        <option>Transfer BRI</option>
                        <option>QRIS</option>

                    </select>

                </div>

                <button class="btn btn-success">

                    Simpan Pembayaran

                </button>

                <a href="/"
                   class="btn btn-secondary">

                    Kembali

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
