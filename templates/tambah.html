<!DOCTYPE html>
<html>

<head>

    <title>Tambah Piutang</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h3>Tambah Piutang</h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                    <input
                        type="hidden"
                        name="cabang"
                        value="{{ cabang }}">

                        <div class="mb-3">

                            <label class="form-label">
                                Tanggal
                            </label>

                            <input type="date"
                                   name="tanggal"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                No Nota
                            </label>

                            <input type="text"
                                   name="no_nota"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Jenis
                            </label>

                            <select name="jenis"
                                    class="form-select">

                                <option value="Customer">
                                    Customer
                                </option>

                                <option value="Cabang">
                                    Cabang
                                </option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Nama
                            </label>

                            <input type="text"
                                   name="nama"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Nominal
                            </label>

                            <input type="number"
                                   name="nominal"
                                   class="form-control"
                                   required>

                        </div>

                        <button class="btn btn-success">

                            Simpan

                        </button>

                        <a href="/"
                           class="btn btn-secondary">

                            Kembali

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
